name: Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publisher

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------------------
  #  Test — verify the package builds and imports cleanly
  # -------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build deps
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Install package
        run: pip install dist/hermes_open_sandbox-*.whl

      - name: Import test
        run: python -c "from hermes_opensandbox import OpenSandboxSession, __version__; print(f'hermes-open-sandbox v{__version__} OK')"

  # -------------------------------------------------------------------
  #  Publish — push to PyPI on tag (uses Trusted Publisher)
  # -------------------------------------------------------------------
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-open-sandbox
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build
        run: python -m build

      # Publish using PyPI Trusted Publisher (no token needed)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: dist/
          verbose: true
